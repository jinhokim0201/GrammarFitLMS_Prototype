  const scores = [92,85,78,90,65,88,72,95,60,83,91,70,88,75,93,68,85,90,72,80,95,63,88,76,85,92,70,88,82,91,68,85,90,75,88,92,70,80,85,90,72,88,65,92,80,85,90,75];
  const s = scores[i] || Math.floor(Math.random()*40+60);
  return {
    no: i+1,
    label: `L${i+1}`,

    level: s >= 80 ? "우수" : s >= 60 ? "양호" : "취약",

const Gauge = ({ score, size=120 }) => {
  const r=size/2-10, circ=Math.PI*r;
  const col=score>=80?C.green6:score>=60?C.orange6:C.red6;
  const label=score>=80?"우수":score>=60?"보통":"부족";
  return (
    <div style={{ position:"relative", width:size, height:size/2+20 }}>
      <svg width={size} height={size} style={{ position:"absolute", top:0 }}>
        <path d={`M 10 ${size/2} A ${r} ${r} 0 0 1 ${size-10} ${size/2}`} fill="none" stroke={C.grey2} strokeWidth={10} strokeLinecap="round"/>
        <path d={`M 10 ${size/2} A ${r} ${r} 0 0 1 ${size-10} ${size/2}`} fill="none" stroke={col} strokeWidth={10} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)}/>
      </svg>
      <div style={{ position:"absolute", bottom:0, width:"100%", textAlign:"center" }}>
        <div style={{ ...F.h1, color:col }}>{score}</div>
        <div style={{ ...F.overline, color:C.grey6 }}>{label}</div>
      </div>
    </div>
  );
};

  const SemiGauge = ({score, size=160}) => {
    const pad = 14;
    const r   = size/2 - pad;          // 반지름
    const cx  = size/2;
    const cy  = size/2;
    // 반원 호의 총 길이 = π * r
    const halfCirc = Math.PI * r;
    // score 비율만큼 채움: offset = halfCirc * (1 - score/100)
    const offset   = halfCirc * (1 - score/100);
    const col   = score>=80?C.green6:score>=60?C.orange6:C.red6;
    const label = score>=80?"우수":score>=60?"보통":"부족";
    // SVG: 반원 중심 cy = size/2, 호의 최하단 = cy (수평선)
    // 텍스트는 SVG 바깥 아래쪽에 배치
    const svgH = cy + pad + 2;
    return (
      <div style={{flexShrink:0, textAlign:"center", width:size}}>
        <svg width={size} height={svgH} style={{display:"block", margin:"0 auto", overflow:"visible"}}>

          <path
            d={`M ${pad} ${cy} A ${r} ${r} 0 0 1 ${size-pad} ${cy}`}
            fill="none" stroke={C.grey2} strokeWidth={12} strokeLinecap="round"/>
          {/* 점수 게이지 */}
          <path

        <div style={{marginTop:8}}>

// ─── 헥사곤 SVG 컴포넌트 ─────────────────────────────────────────────────
const HexItem = ({ item, onClick }) => {
  const statusStyle = {
    "우수":   { bg:"#4CAF50", text:"#FFFFFF", border:"#4CAF50" },
    "보통":   { bg:"#FFC107", text:"#FFFFFF", border:"#FFC107" },
    "취약":   { bg:"#F44336", text:"#FFFFFF", border:"#F44336" },
    "시작전": { bg:"#EEEEEE", text:"#AAAAAA", border:"#DDDDDD" },
  };
  const s = statusStyle[item.status];
  const W = 110, H = 124;
  // 헥사곤 포인트 (뾰족한 위아래)
  const cx = W/2, cy = H/2, rx = W/2 - 4, ry = H/2 - 4;
  const pts = [0,1,2,3,4,5].map(i => {
    const a = Math.PI/180 * (60*i - 30);
    return `${cx + rx*Math.cos(a)},${cy + ry*Math.sin(a)}`;
  }).join(" ");

  return (
    <div onClick={()=>item.status!=="시작전"&&onClick(item)}
      style={{ width:W, height:H, position:"relative", cursor:item.status!=="시작전"?"pointer":"default",
        transition:"transform 0.15s", flexShrink:0 }}
      onMouseEnter={e=>{ if(item.status!=="시작전") e.currentTarget.style.transform="scale(1.06)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; }}>
      <svg width={W} height={H} style={{ position:"absolute", top:0, left:0 }}>
        <polygon points={pts} fill={s.bg} stroke={s.border} strokeWidth={2}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 10px" }}>
        <div style={{ fontFamily:"'Pretendard',sans-serif", fontWeight:700, fontSize:12,
          color:s.text, lineHeight:1.3, marginBottom:4 }}>{item.label}</div>
        {item.score !== null
          ? <div style={{ fontFamily:"'Pretendard',sans-serif", fontWeight:700, fontSize:16,
              color:s.text }}>{item.score}%</div>
          : <div style={{ fontSize:16, color:s.text }}>🔒</div>
        }
      </div>
    </div>
  );
};

};

        <ReportModal
          lesson={showReport.subject}
          lessonType={showReport.lessonType}
          onClose={()=>setShowReport(null)}

    </div>
  );
};

// ─── 메인 앱 ──────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [student, setStudent] = useState(null);
  const handleNav = (p) => { setPage(p); setStudent(null); };
  const renderMain = () => {
    if(student) return <StudentDetail student={student} onBack={()=>setStudent(null)}/>;
    switch(page) {
      case "home":      return <HomePage/>;
      case "students":  return <StudentsPage onSelect={setStudent}/>;
      case "diagnosis": return <DiagnosisPage/>;
      case "alimtalk":  return <AlimtalkPage/>;
      default: return <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", ...F.body2, color:C.grey5 }}>🚧 준비 중인 화면입니다.</div>;
    }
  };
  return (
    <div style={{ display:"flex", height:"100vh", fontFamily:"'Pretendard','Apple SD Gothic Neo',sans-serif", background:C.grey1 }}>
      <SideMenu active={page} setActive={handleNav}/>
      {renderMain()}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
