  const scores = [92,85,78,90,65,88,72,95,60,83,91,70,88,75,93,68,85,90,72,80,95,63,88,76,85,92,70,88,82,91,68,85,90,75,88,92,70,80,85,90,72,88,65,92,80,85,90,75];
  const s = scores[i] || Math.floor(Math.random()*40+60);
  return {
    no: i+1,
    label: `L${i+1}`,
    score: i < 24 ? s : null, // 24이후는 미학습
    level: s >= 80 ? "우수" : s >= 60 ? "양호" : "취약",

const Gauge = ({ score, size=120 }) => {
  const r=size/2-10, circ=Math.PI*r;
  const col=score>=80?C.green6:score>=60?C.orange6:C.red6;
  const label=score>=80?"우수":score>=60?"보통":"부족";
  return (
    <div style={{ position:"relative", width:size, height:size/2+20 }}>
      <svg width={size} height={size} style={{ position:"absolute", top:0 }}>
        <path d={`M 10 ${size/2} A ${r} ${r} 0 0 1 ${size-10} ${size/2}`} fill="none" stroke={C.grey2} strokeWidth={10} strokeLinecap="round"/>
        <path d={`M 10 ${size/2} A ${r} ${r} 0 0 1 ${size-10} ${size/2}`} fill="none" stroke={col} strokeWidth={10} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)}/>
      </svg>
      <div style={{ position:"absolute", bottom:0, width:"100%", textAlign:"center" }}>
        <div style={{ ...F.h1, color:col }}>{score}</div>
        <div style={{ ...F.overline, color:C.grey6 }}>{label}</div>
      </div>
    </div>
  );
};

const AttendanceModal = ({ student, onClose }) => {
  const [activeTab, setActiveTab] = useState("scheduled");
  const [currentDate, setCurrentDate] = useState(new Date(2026, 4, 1));
  const [checkedSubjects, setCheckedSubjects] = useState(["MT","PDM"]);

  const subjects = [
    { code:"MT",  name:"수능영어독해트레이닝", days:["월","화"], total:7, done:8, extra:1, color:"#049EDC" },
    { code:"ET",  name:"수능영어독해트레이닝", days:["월","화"], total:7, done:4, extra:1, color:"#E91E8C" },
    { code:"MT2", name:"수능영어독해트레이닝", days:["월","목"],  total:7, done:8, extra:1, color:"#049EDC" },
    { code:"PDM", name:"GrammarFit",           days:["화","수"],  total:7, done:6, extra:0, color:"#22C55E" },
  ];
  const allCodes = subjects.map(s=>s.code);

  const events = {
    "2026-05-04":[{code:"MT",color:"#049EDC"},{code:"MT",color:"#049EDC"},{code:"MT",color:"#049EDC"},{code:"ET",color:"#E91E8C"},{code:"ET",color:"#E91E8C"}],
    "2026-05-05":[{code:"MT",color:"#049EDC"}],
    "2026-05-11":[{code:"MT",color:"#049EDC"}],
    "2026-05-12":[{code:"MT",color:"#049EDC"}],
    "2026-05-13":[{code:"ET",color:"#E91E8C"}],
    "2026-05-19":[{code:"MT",color:"#049EDC"}],
    "2026-05-20":[{code:"MT",color:"#049EDC"},{code:"ET",color:"#E91E8C"}],
    "2026-05-25":[{code:"MT",color:"#049EDC"},{code:"ET",color:"#E91E8C"}],
    "2026-05-26":[{code:"MT",color:"#049EDC"},{code:"ET",color:"#E91E8C"}],
    "2026-05-29":[{code:"ET",color:"#E91E8C"}],
  };

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const weeks = [];
  let day = 1 - firstDay;
  while(day <= daysInMonth) {
    const week = [];
    for(let d=0; d<7; d++, day++) week.push(day>0&&day<=daysInMonth?day:null);
    weeks.push(week);
  }

  const toggleSubject = (code) =>
    setCheckedSubjects(prev=>prev.includes(code)?prev.filter(c=>c!==code):[...prev,code]);
  const toggleAll = () =>
    setCheckedSubjects(checkedSubjects.length===allCodes.length?[]:allCodes.slice());

  const dayNames = ["일","월","화","수","목","금","토"];
  const monthStr = `${y}년 ${m+1}월`;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.white,borderRadius:12,overflow:"hidden",
        width:"90vw",maxWidth:1100,height:"85vh",display:"flex",flexDirection:"column"}}>
        {/* 헤더 */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",height:52,borderBottom:`1px solid ${C.grey2}`,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{...F.h2,color:C.dark}}>{student?.name||"학생"}</span>
            <span style={{...F.body2,color:C.grey6}}>{monthStr}</span>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.grey6}}>✕</button>
        </div>
        {/* 바디 */}
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          {/* 좌측: 과목 목록 */}
          <div style={{width:220,borderRight:`1px solid ${C.grey2}`,overflowY:"auto",padding:"12px 0",flexShrink:0}}>
            <div style={{display:"flex",margin:"0 12px 12px",border:`1px solid ${C.grey2}`,borderRadius:6,overflow:"hidden"}}>
              {[["scheduled","지정된 학습"],["other","다른 날 학습"]].map(([id,label])=>(
                <button key={id} onClick={()=>setActiveTab(id)} style={{flex:1,padding:"6px 0",border:"none",
                  background:activeTab===id?C.lightBlue6:C.white,
                  color:activeTab===id?C.white:C.grey6,
                  fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  {label}
                </button>
              ))}
            </div>
            {subjects.map(s=>(
              <div key={s.code} style={{padding:"10px 16px",borderBottom:`1px solid ${C.grey1}`}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:700,color:s.color}}>{s.code}</span>
                  <span style={{fontSize:12,color:C.grey8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                </div>
                <div style={{display:"flex",gap:4,marginBottom:4}}>
                  {dayNames.map(d=>(
                    <span key={d} style={{fontSize:10,fontWeight:700,color:s.days.includes(d)?s.color:C.grey3}}>{d}</span>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,fontSize:11,color:C.grey6}}>
                  <span>{s.total}/{s.done}일</span>
                  {s.extra>0&&<span style={{color:"#E91E8C"}}>{s.extra}일</span>}
                </div>
              </div>
            ))}
          </div>
          {/* 우측: 달력 */}
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.grey2}`,display:"flex",alignItems:"center",flexWrap:"wrap",gap:10,flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setCurrentDate(new Date(y,m-1,1))} style={{background:"none",border:`1px solid ${C.grey3}`,borderRadius:4,width:28,height:28,cursor:"pointer",color:C.grey6,fontSize:14}}>‹</button>
                <span style={{...F.sub2,color:C.dark,minWidth:90,textAlign:"center"}}>{monthStr}</span>
                <button onClick={()=>setCurrentDate(new Date(y,m+1,1))} style={{background:"none",border:`1px solid ${C.grey3}`,borderRadius:4,width:28,height:28,cursor:"pointer",color:C.grey6,fontSize:14}}>›</button>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:12,color:C.grey8}}>
                <input type="checkbox" checked={checkedSubjects.length===allCodes.length} onChange={toggleAll} style={{cursor:"pointer"}}/>전체
              </label>
              {subjects.map(s=>(
                <label key={s.code} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:12}}>
                  <input type="checkbox" checked={checkedSubjects.includes(s.code)} onChange={()=>toggleSubject(s.code)} style={{cursor:"pointer",accentColor:s.color}}/>
                  <span style={{color:s.color,fontWeight:700}}>{s.code}</span>
                </label>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                <thead>
                  <tr>
                    {dayNames.map((d,i)=>(
                      <th key={d} style={{padding:"8px 0",textAlign:"center",fontSize:12,
                        color:i===0?"#E53935":i===6?"#1565C0":C.grey6,
                        fontWeight:500,borderBottom:`1px solid ${C.grey2}`}}>{d}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {weeks.map((week,wi)=>(
                    <tr key={wi}>
                      {week.map((day,di)=>{
                        const dk=day?`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`:null;
                        const evs=(dk&&events[dk]||[]).filter(e=>checkedSubjects.includes(e.code));
                        return (
                          <td key={di} style={{padding:"4px",verticalAlign:"top",
                            borderBottom:`1px solid ${C.grey1}`,borderRight:`1px solid ${C.grey1}`,height:72}}>
                            {day && (
                              <>
                                <div style={{fontSize:12,color:di===0?"#E53935":di===6?"#1565C0":C.grey8,
                                  fontWeight:400,marginBottom:3,paddingLeft:2}}>{day}</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                                  {evs.map((ev,ei)=>(
                                    <span key={ei} style={{fontSize:10,fontWeight:700,color:C.white,
                                      background:ev.color,borderRadius:3,padding:"1px 4px",lineHeight:1.4}}>
                                      {ev.code}
                                    </span>
                                  ))}
                                </div>
                              </>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

};

// ─── 헥사곤 SVG 컴포넌트 ─────────────────────────────────────────────────
const HexItem = ({ item, onClick }) => {
  const statusStyle = {
    "우수":   { bg:"#4CAF50", text:"#FFFFFF", border:"#4CAF50" },
    "보통":   { bg:"#FFC107", text:"#FFFFFF", border:"#FFC107" },
    "취약":   { bg:"#F44336", text:"#FFFFFF", border:"#F44336" },
    "시작전": { bg:"#EEEEEE", text:"#AAAAAA", border:"#DDDDDD" },
  };
  const s = statusStyle[item.status];
  const W = 110, H = 124;
  // 헥사곤 포인트 (뾰족한 위아래)
  const cx = W/2, cy = H/2, rx = W/2 - 4, ry = H/2 - 4;
  const pts = [0,1,2,3,4,5].map(i => {
    const a = Math.PI/180 * (60*i - 30);
    return `${cx + rx*Math.cos(a)},${cy + ry*Math.sin(a)}`;
  }).join(" ");

  return (
    <div onClick={()=>item.status!=="시작전"&&onClick(item)}
      style={{ width:W, height:H, position:"relative", cursor:item.status!=="시작전"?"pointer":"default",
        transition:"transform 0.15s", flexShrink:0 }}
      onMouseEnter={e=>{ if(item.status!=="시작전") e.currentTarget.style.transform="scale(1.06)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; }}>
      <svg width={W} height={H} style={{ position:"absolute", top:0, left:0 }}>
        <polygon points={pts} fill={s.bg} stroke={s.border} strokeWidth={2}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 10px" }}>
        <div style={{ fontFamily:"'Pretendard',sans-serif", fontWeight:700, fontSize:12,
          color:s.text, lineHeight:1.3, marginBottom:4 }}>{item.label}</div>
        {item.score !== null
          ? <div style={{ fontFamily:"'Pretendard',sans-serif", fontWeight:700, fontSize:16,
              color:s.text }}>{item.score}%</div>
          : <div style={{ fontSize:16, color:s.text }}>🔒</div>
        }
      </div>
    </div>
  );
};

                    <span style={{ fontSize:14, color: item.correct ? C.green6 : C.red6 }}>{item.correct ? "○" : "✕"}</span>
                  </div>
                ))}
              </div>
              {(()=>{
                const item = WRONG_ITEMS.find(i=>i.no===wrongItem);
                if(!item) return null;
                return (
                  <div style={{ flex:1, padding:"32px 40px", overflowY:"auto" }}>
                    <div style={{ marginBottom:24 }}>
                      <span style={{ ...F.sub1, color:C.dark }}>{item.no}.</span>
                      <div style={{ ...F.body2, color:C.grey8, marginTop:6 }}>{item.question}</div>
                    </div>
                    <div style={{ width:40, height:40, borderRadius:"50%", background:C.lightBlue6, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, cursor:"pointer", marginBottom:24 }}>🔊</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:32 }}>
                      {item.options.map((opt,i)=>{
                        const isAnswer = (i+1)===item.answer;
                        return (
                          <div key={i} style={{
                            display:"flex", alignItems:"center", gap:10,
                            padding:"10px 16px", borderRadius:8,
                            background: isAnswer ? C.lightBlue1 : C.white,
                            border: isAnswer ? `1px solid ${C.lightBlue6}` : "1px solid transparent",
                          }}>
                            {isAnswer ? (
                              <span style={{ width:22,height:22,borderRadius:"50%",background:C.lightBlue6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.white,flexShrink:0 }}>{i+1}</span>
                            ) : (
                              <span style={{ ...F.body2, color:C.grey5, flexShrink:0 }}>{i+1}</span>
                            )}
                            <span style={{ ...F.body2, color: isAnswer ? C.lightBlue6 : C.grey8 }}>{opt.replace("① ","").replace("② ","").replace("③ ","")}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                      <div><span style={{ ...F.sub3, color:C.dark, display:"block", marginBottom:4 }}>해설</span><span style={{ ...F.body2, color:C.grey8 }}>{item.explanation}</span></div>

                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── 메인 앱 ──────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [student, setStudent] = useState(null);
  const [report, setReport] = useState(null);
  const openReport = (lesson, lessonType) => setReport({ lesson, lessonType });
  const closeReport = () => setReport(null);
  const handleNav = (p) => { setPage(p); setStudent(null); setReport(null); };
  const renderMain = () => {
    if(report) return <ReportPage lesson={report.lesson} lessonType={report.lessonType} onClose={closeReport}/>;
    if(student) return <StudentDetail student={student} onBack={()=>setStudent(null)} onReport={openReport}/>;
    switch(page) {
      case "home":      return <HomePage/>;
      case "students":  return <StudentsPage onSelect={setStudent} onReport={openReport}/>;
      case "diagnosis": return <DiagnosisPage onReport={openReport}/>;
      case "alimtalk":  return <AlimtalkPage/>;
      default: return <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", ...F.body2, color:C.grey5 }}>🚧 준비 중인 화면입니다.</div>;
    }
  };
  return (
    <div style={{ display:"flex", height:"100vh", fontFamily:"'Pretendard','Apple SD Gothic Neo',sans-serif", background:C.grey1 }}>
      <SideMenu active={page} setActive={handleNav}/>
      {renderMain()}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
